<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VectorAlert Test</title>
    <style>
        body {
            font-family: monospace;
            background: #000;
            color: #00ff00;
            margin: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #00ff00;
        }
        .pass {
            color: #00ff00;
        }
        .fail {
            color: #ff0000;
        }
    </style>
</head>
<body>
    <h1>VectorAlert System Test</h1>
    
    <div class="test-section">
        <h2>1. Module Loading Test</h2>
        <div id="module-test">Testing...</div>
    </div>
    
    <div class="test-section">
        <h2>2. Geolocation Test</h2>
        <div id="geo-test">Testing...</div>
    </div>
    
    <div class="test-section">
        <h2>3. Aircraft Database Test</h2>
        <div id="db-test">Testing...</div>
    </div>
    
    <div class="test-section">
        <h2>4. API Test</h2>
        <div id="api-test">Testing...</div>
    </div>
    
    <div class="test-section">
        <h2>5. Alert System Test</h2>
        <div id="alert-test">Testing...</div>
    </div>

    <script>
        // Test 1: Module Loading
        async function testModules() {
            const result = document.getElementById('module-test');
            try {
                // Load modules
                const geoModule = await fetch('./js/geo.js').then(r => r.text());
                const apiModule = await fetch('./js/api.js').then(r => r.text());
                const alertModule = await fetch('./js/alerts.js').then(r => r.text());
                const uiModule = await fetch('./js/ui.js').then(r => r.text());
                const appModule = await fetch('./js/app.js').then(r => r.text());
                
                result.innerHTML = '<span class="pass">✓ All modules loaded successfully</span>';
            } catch (error) {
                result.innerHTML = `<span class="fail">✗ Module loading failed: ${error.message}</span>`;
            }
        }

        // Test 2: Geolocation
        function testGeolocation() {
            const result = document.getElementById('geo-test');
            if ('geolocation' in navigator) {
                result.innerHTML = '<span class="pass">✓ Geolocation API available</span>';
            } else {
                result.innerHTML = '<span class="fail">✗ Geolocation API not available</span>';
            }
        }

        // Test 3: Aircraft Database
        async function testAircraftDB() {
            const result = document.getElementById('db-test');
            try {
                const response = await fetch('./data/aircraft-db.json');
                const data = await response.json();
                const aircraftCount = Object.keys(data.aircraft_types).length;
                result.innerHTML = `<span class="pass">✓ Aircraft database loaded (${aircraftCount} aircraft types)</span>`;
            } catch (error) {
                result.innerHTML = `<span class="fail">✗ Aircraft database failed: ${error.message}</span>`;
            }
        }

        // Test 4: API Connectivity
        async function testAPI() {
            const result = document.getElementById('api-test');
            try {
                const response = await fetch('https://opensky-network.org/api/states/all');
                if (response.ok) {
                    result.innerHTML = '<span class="pass">✓ OpenSky API reachable</span>';
                } else {
                    result.innerHTML = `<span class="fail">✗ OpenSky API returned status: ${response.status}</span>`;
                }
            } catch (error) {
                result.innerHTML = `<span class="fail">✗ API test failed: ${error.message}</span>`;
            }
        }

        // Test 5: Alert System
        function testAlertSystem() {
            const result = document.getElementById('alert-test');
            if ('Notification' in window) {
                result.innerHTML = '<span class="pass">✓ Notification API available</span>';
            } else {
                result.innerHTML = '<span class="fail">✗ Notification API not available</span>';
            }
        }

        // Run all tests
        document.addEventListener('DOMContentLoaded', () => {
            testModules();
            testGeolocation();
            testAircraftDB();
            testAPI();
            testAlertSystem();
        });
    </script>
</body>
</html>
